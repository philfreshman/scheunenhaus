name: Deploy to FTP
on:
    push:
        branches:
            - main
            - development
    workflow_dispatch:
jobs:
    deploy-production:
        if: github.ref_name == 'main'
        runs-on: ubuntu-latest
        environment: Production
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - run: bun install --frozen-lockfile
            - name: Build Astro site
              run: bun run build
              env:
                  PUBLIC_GOOGLE_CALENDAR_API_KEY: ${{ secrets.PUBLIC_GOOGLE_CALENDAR_API_KEY }}
                  PUBLIC_GOOGLE_CALENDAR_ID_1: ${{ secrets.PUBLIC_GOOGLE_CALENDAR_ID_1 }}
                  PUBLIC_GOOGLE_CALENDAR_ID_2: ${{ secrets.PUBLIC_GOOGLE_CALENDAR_ID_2 }}
                  PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.PUBLIC_GOOGLE_MAPS_API_KEY }}
                  PUBLIC_GOOGLE_MAPS_PLACE_ID: ${{ secrets.PUBLIC_GOOGLE_MAPS_PLACE_ID }}
            - name: Verify build output
              run: |
                  if [ ! -d "dist" ]; then
                    echo "❌ dist/ folder not found!"
                    exit 1
                  fi
                  echo "✅ Build output verified."
            - name: Deploy to FTP
              uses: SamKirkland/FTP-Deploy-Action@v4.4.0
              with:
                  server: ${{ secrets.FTP_HOST }}
                  username: ${{ secrets.FTP_USER }}
                  password: ${{ secrets.FTP_PASSWORD }}
                  local-dir: ./dist/
                  server-dir: /scheunenhausamsee.de/
                  timeout: 300000
                  log-level: verbose
    deploy-development:
        if: github.ref_name == 'development'
        runs-on: ubuntu-latest
        environment: Development
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - run: bun install --frozen-lockfile
            - name: Build Astro site
              run: bun run build
              env:
                  PUBLIC_GOOGLE_CALENDAR_API_KEY: ${{ secrets.PUBLIC_GOOGLE_CALENDAR_API_KEY }}
                  PUBLIC_GOOGLE_CALENDAR_ID_1: ${{ secrets.PUBLIC_GOOGLE_CALENDAR_ID_1 }}
                  PUBLIC_GOOGLE_CALENDAR_ID_2: ${{ secrets.PUBLIC_GOOGLE_CALENDAR_ID_2 }}
                  PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.PUBLIC_GOOGLE_MAPS_API_KEY }}
                  PUBLIC_GOOGLE_MAPS_PLACE_ID: ${{ secrets.PUBLIC_GOOGLE_MAPS_PLACE_ID }}
            - name: Verify build output
              run: |
                  if [ ! -d "dist" ]; then
                    echo "❌ dist/ folder not found!"
                    exit 1
                  fi
                  echo "✅ Build output verified."
            - name: Deploy to FTP
              uses: SamKirkland/FTP-Deploy-Action@v4.4.0
              with:
                  server: ${{ secrets.FTP_HOST }}
                  username: ${{ secrets.FTP_USER }}
                  password: ${{ secrets.FTP_PASSWORD }}
                  local-dir: ./dist/
                  server-dir: /development.scheunenhausamsee.de/
                  timeout: 300000
                  log-level: verbose
