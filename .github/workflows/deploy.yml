name: Deploy to FTP
on:
    push:
        branches:
            - main
            - development
    workflow_dispatch:
jobs:
    deploy-production:
        if: github.ref_name == 'main'
        runs-on: ubuntu-latest
        environment: Production
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Cache npm modules
              uses: actions/cache@v4
              with:
                  path: ~/.npm
                  key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-npm-
            - name: Install dependencies
              run: npm ci --prefer-offline
            - name: Build Astro site
              run: npm run build
              env:
                  PUBLIC_GOOGLE_CALENDAR_API_KEY: ${{ secrets.PUBLIC_GOOGLE_CALENDAR_API_KEY }}
                  PUBLIC_GOOGLE_CALENDAR_ID_1: ${{ secrets.PUBLIC_GOOGLE_CALENDAR_ID_1 }}
                  PUBLIC_GOOGLE_CALENDAR_ID_2: ${{ secrets.PUBLIC_GOOGLE_CALENDAR_ID_2 }}
                  PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.PUBLIC_GOOGLE_MAPS_API_KEY }}
                  PUBLIC_GOOGLE_MAPS_PLACE_ID: ${{ secrets.PUBLIC_GOOGLE_MAPS_PLACE_ID }}
            - name: Verify build output
              run: |
                  if [ ! -d "dist" ]; then
                    echo "❌ dist/ folder not found! Build may have failed."
                    exit 1
                  fi
                  echo "✅ Build output verified."
            - name: Deploy to FTP
              uses: SamKirkland/FTP-Deploy-Action@v4.3.6
              with:
                  server: ${{ secrets.FTP_HOST }}
                  username: ${{ secrets.FTP_USER }}
                  password: ${{ secrets.FTP_PASSWORD }}
                  local-dir: ./dist/
                  server-dir: /scheunenhausamsee.de/
                  timeout: 300000
                  log-level: verbose
              env:
                  FTP_TIMEOUT: 300000
    deploy-development:
        if: github.ref_name == 'development'
        runs-on: ubuntu-latest
        environment: Development
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Cache npm modules
              uses: actions/cache@v4
              with:
                  path: ~/.npm
                  key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-npm-
            - name: Install dependencies
              run: npm ci --prefer-offline
            - name: Build Astro site
              run: npm run build
              env:
                  PUBLIC_GOOGLE_CALENDAR_API_KEY: ${{ secrets.PUBLIC_GOOGLE_CALENDAR_API_KEY }}
                  PUBLIC_GOOGLE_CALENDAR_ID_1: ${{ secrets.PUBLIC_GOOGLE_CALENDAR_ID_1 }}
                  PUBLIC_GOOGLE_CALENDAR_ID_2: ${{ secrets.PUBLIC_GOOGLE_CALENDAR_ID_2 }}
                  PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.PUBLIC_GOOGLE_MAPS_API_KEY }}
                  PUBLIC_GOOGLE_MAPS_PLACE_ID: ${{ secrets.PUBLIC_GOOGLE_MAPS_PLACE_ID }}
            - name: Verify build output
              run: |
                  if [ ! -d "dist" ]; then
                    echo "❌ dist/ folder not found! Build may have failed."
                    exit 1
                  fi
                  echo "✅ Build output verified."
            - name: Deploy to FTP
              uses: SamKirkland/FTP-Deploy-Action@v4.3.6
              with:
                  server: ${{ secrets.FTP_HOST }}
                  username: ${{ secrets.FTP_USER }}
                  password: ${{ secrets.FTP_PASSWORD }}
                  local-dir: ./dist/
                  server-dir: /development.scheunenhausamsee.de/
                  timeout: 300000
                  log-level: verbose
              env:
                  FTP_TIMEOUT: 300000